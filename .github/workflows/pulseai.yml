name: PulseAI Daily Briefing

on:
  schedule:
    - cron: '7 8 * * *'
      timezone: 'America/Chicago'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pulseai-daily-briefing
  cancel-in-progress: false

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Prepare artifacts directory
        run: mkdir -p artifacts/out

      - name: Generate briefing and send email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ARTICLE_LIMIT_PER_FEED: ${{ vars.ARTICLE_LIMIT_PER_FEED }}
          STORIES_TO_SUMMARIZE: ${{ vars.STORIES_TO_SUMMARIZE }}
          EMAIL_SUBJECT_PREFIX: ${{ vars.EMAIL_SUBJECT_PREFIX }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          RECIPIENT_OVERRIDE: ${{ vars.RECIPIENT_OVERRIDE }}
          ARTIFACTS_DIR: artifacts/out
        run: npm run run

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pulseai-run-${{ github.run_number }}
          path: artifacts/out
          retention-days: 14
          if-no-files-found: warn